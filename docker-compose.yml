services:
  postgres:
    image: postgres:16-alpine
    container_name: bridge-aggregator-db
    environment:
      POSTGRES_USER: bridge
      POSTGRES_PASSWORD: bridge123
      POSTGRES_DB: bridge_aggregator
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bridge"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NETWORK=mainnet
      - DATABASE_URL=postgresql://bridge:bridge123@postgres:5432/bridge_aggregator?sslmode=disable
      - BLOCKDAEMON_API_KEY=${BLOCKDAEMON_API_KEY:-}
      - ACROSS_DEPOSITOR=${ACROSS_DEPOSITOR:-}
      - RPC_URL=${RPC_URL:-}
      - UNISWAP_TRADING_API_KEY=${UNISWAP_TRADING_API_KEY:-}
      - ZEROX_API_KEY=${ZEROX_API_KEY:-}
      - ONEINCH_API_KEY=${ONEINCH_API_KEY:-}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-*}
    depends_on:
      postgres:
        condition: service_healthy

  api-testnet:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NETWORK=testnet
      - DATABASE_URL=postgresql://bridge:bridge123@postgres:5432/bridge_aggregator?sslmode=disable
      - BLOCKDAEMON_API_KEY=${BLOCKDAEMON_API_KEY:-}
      - ACROSS_DEPOSITOR=${ACROSS_DEPOSITOR:-}
      - RPC_URL=${RPC_URL_TESTNET:-}
      - UNISWAP_TRADING_API_KEY=${UNISWAP_TRADING_API_KEY:-}
      - ZEROX_API_KEY=${ZEROX_API_KEY:-}
      - ONEINCH_API_KEY=${ONEINCH_API_KEY:-}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-*}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_WALLETCONNECT_PROJECT_ID: ${VITE_WALLETCONNECT_PROJECT_ID:-}
    ports:
      - "80:80"
    depends_on:
      - api
      - api-testnet

volumes:
  postgres_data:
