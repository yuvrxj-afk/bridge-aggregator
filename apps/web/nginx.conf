server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # index.html must never be cached — it references hashed asset filenames.
    # A stale cached index.html after a deploy causes users to load the old JS bundle.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Serve static assets with long cache; versioned by Vite's content hash filenames.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all routes serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
