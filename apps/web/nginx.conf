server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # index.html must never be cached — it references hashed asset filenames.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Serve static assets with long cache; versioned by Vite's content hash filenames.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Testnet API — rewrite prefix before proxying so backend receives /api/v1/...
    location /api/testnet/ {
        rewrite ^/api/testnet(/.*) /api$1 break;
        proxy_pass http://${API_TESTNET_UPSTREAM};
        proxy_http_version 1.1;
        # SSE / streaming — disable buffering.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Mainnet API
    location /api/ {
        proxy_pass http://${API_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # SPA fallback — all other routes serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
